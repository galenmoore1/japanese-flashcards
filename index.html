<title>日本語 Flashcards</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  background: #111827;
  color: #f3f4f6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
#progress {
  font-size: 14px;
  color: #6b7280;
  margin-bottom: 20px;
  letter-spacing: 0.5px;
}
#card-wrap {
  width: 100%;
  max-width: 420px;
  cursor: pointer;
}
#card {
  width: 100%;
  min-height: 240px;
  background: #1f2937;
  border: 1px solid #374151;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 36px 28px;
  text-align: center;
  gap: 18px;
  transition: border-color 0.2s;
}
#card:active { border-color: #2563eb; }
.line { opacity: 0; transition: opacity 0.3s ease; }
.line.visible { opacity: 1; }
#line-kanji { font-size: 38px; font-weight: 500; line-height: 1.35; }
#line-kana  { font-size: 22px; color: #93c5fd; }
#line-eng   { font-size: 22px; color: #f3f4f6; line-height: 1.4; }
#hint {
  font-size: 12px;
  color: #4b5563;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: opacity 0.2s;
}
#controls {
  display: flex;
  gap: 12px;
  margin-top: 28px;
  align-items: center;
}
button {
  background: #1f2937;
  color: #f3f4f6;
  border: 1px solid #374151;
  border-radius: 14px;
  padding: 14px 0;
  font-size: 22px;
  cursor: pointer;
  width: 80px;
  transition: background 0.15s;
}
button:active { background: #374151; }
#mode-btn {
  width: auto;
  padding: 14px 20px;
  font-size: 13px;
  color: #a5b4fc;
  border-color: #4338ca;
  letter-spacing: 0.5px;
}
#mode-btn.reversed {
  color: #fcd34d;
  border-color: #d97706;
}
#shuffle-btn {
  width: auto;
  padding: 14px 24px;
  font-size: 13px;
  color: #6b7280;
  border-color: #374151;
  margin-top: 12px;
}
</style>
</head>
<body>

<div id="progress">Card <span id="cur">1</span> of <span id="tot">0</span></div>

<div id="card-wrap">
  <div id="card">
    <div id="line-kanji" class="line"></div>
    <div id="line-kana"  class="line"></div>
    <div id="line-eng"   class="line"></div>
    <div id="hint">tap to reveal</div>
  </div>
</div>

<div id="controls">
  <button onclick="nav(-1)">&#8592;</button>
  <button onclick="nav(1)">&#8594;</button>
  <button id="mode-btn" onclick="toggleMode()">EN first</button>
</div>
<button id="shuffle-btn" onclick="reshuffle()">&#x1F500; Shuffle</button>

let deck = [], idx = 0, stage = 0, reversed = false;

function getStages(c) {
  if (reversed) {
    const s = [{el:'line-eng', text: c.e}];
    if (c.k) s.push({el:'line-kana', text: c.k});
    s.push({el:'line-kanji', text: c.f});
    return s;
  } else {
    const s = [{el:'line-kanji', text: c.f}];
    if (c.k) s.push({el:'line-kana', text: c.k});
    s.push({el:'line-eng', text: c.e});
    return s;
  }
}

function show() {
  const c = deck[idx];
  const ss = getStages(c);
  ['line-kanji','line-kana','line-eng'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('visible');
    el.textContent = '';
  });
  for (let i = 0; i <= stage && i < ss.length; i++) {
    const el = document.getElementById(ss[i].el);
    el.textContent = ss[i].text;
    el.classList.add('visible');
  }
  const hint = document.getElementById('hint');
  hint.style.opacity = stage >= ss.length - 1 ? '0' : '1';
  document.getElementById('cur').textContent = idx + 1;
  document.getElementById('tot').textContent = deck.length;
}

function tap() {
  const ss = getStages(deck[idx]);
  if (stage < ss.length - 1) {
    stage++;
    show();
  } else {
    nav(1);
  }
}

function nav(dir) {
  idx = (idx + dir + deck.length) % deck.length;
  stage = 0;
  show();
}

function toggleMode() {
  reversed = !reversed;
  const btn = document.getElementById('mode-btn');
  btn.textContent = reversed ? 'JP first' : 'EN first';
  btn.classList.toggle('reversed', reversed);
  stage = 0;
  show();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function reshuffle() {
  deck = shuffle([...VOCAB]);
  idx = 0; stage = 0;
  show();
}

document.getElementById('card-wrap').addEventListener('click', tap);

let tx = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, {passive: true});
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 50) nav(dx < 0 ? 1 : -1);
}, {passive: true});

reshuffle();
</script>
</body>
</html>
