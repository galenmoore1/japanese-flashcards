<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>日本語 Flashcards</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  background: #111827;
  color: #f3f4f6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
#progress {
  font-size: 14px;
  color: #6b7280;
  margin-bottom: 20px;
  letter-spacing: 0.5px;
}
#card-wrap {
  width: 100%;
  max-width: 420px;
  perspective: 1200px;
  cursor: pointer;
}
#card {
  width: 100%;
  min-height: 240px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
}
#card.flipped { transform: rotateY(180deg); }
.face {
  position: absolute;
  width: 100%;
  min-height: 240px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 36px 28px;
  text-align: center;
}
#front-face {
  background: #1f2937;
  border: 1px solid #374151;
}
#back-face {
  background: #1e3a5f;
  border: 1px solid #2563eb;
  transform: rotateY(180deg);
}
#front-text {
  font-size: 38px;
  line-height: 1.35;
  font-weight: 500;
}
#hint {
  font-size: 12px;
  color: #4b5563;
  margin-top: 16px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
#back-kana {
  font-size: 22px;
  color: #93c5fd;
  margin-bottom: 16px;
  min-height: 28px;
}
#back-english {
  font-size: 22px;
  color: #f3f4f6;
  line-height: 1.4;
}
#controls {
  display: flex;
  gap: 12px;
  margin-top: 28px;
}
button {
  background: #1f2937;
  color: #f3f4f6;
  border: 1px solid #374151;
  border-radius: 14px;
  padding: 14px 0;
  font-size: 22px;
  cursor: pointer;
  width: 80px;
  transition: background 0.15s;
}
button:active { background: #374151; }
#shuffle-btn {
  width: auto;
  padding: 14px 28px;
  font-size: 14px;
  color: #a5b4fc;
  border-color: #4338ca;
  letter-spacing: 0.5px;
}
</style>
</head>
<body>

<div id="progress">Card <span id="cur">1</span> of <span id="tot">0</span></div>

<div id="card-wrap">
  <div id="card">
    <div class="face" id="front-face">
      <div id="front-text"></div>
      <div id="hint">tap to reveal</div>
    </div>
    <div class="face" id="back-face">
      <div id="back-kana"></div>
      <div id="back-english"></div>
    </div>
  </div>
</div>

<div id="controls">
  <button onclick="nav(-1)">&#8592;</button>
  <button onclick="nav(1)">&#8594;</button>
</div>
<br>
<button id="shuffle-btn" onclick="reshuffle()">&#x1F500; Shuffle</button>

{"f": "受付", "k": "うけつけ", "e": "Reception"}, {"f": "下旬", "k": "げじゅん", "e": "Late in the month"}, {"f": "上旬", "k": "じょうじゅん", "e": "Early in the month"}, {"f": "検討", "k": "けんとう", "e": "Consider"}, {"f": "ご担当者様", "k": "ごたんとうしゃさま", "e": "To whom it may concern"}, {"f": "初めて連絡いたします", "k": "はじめてれんらくいたします", "e": "This is my first time contacting you"}, {"f": "大丈夫", "k": "だいじょうぶ", "e": "OK"}, {"f": "会社", "k": "かいしゃ", "e": "Company"}, {"f": "〜のに", "k": "", "e": "Even though〜"}, {"f": "入る", "k": "はいる", "e": "To enter"}, {"f": "〜して", "k": "", "e": "Please do〜, I'll do〜"}, {"f": "楽しむ", "k": "たのしむ", "e": "To enjoy"}, {"f": "おく", "k": "", "e": "To prepare"}, {"f": "〜してある", "k": "", "e": "I have done〜"}, {"f": "別", "k": "べつ", "e": "Different"}, {"f": "別に", "k": "べつに", "e": "Not so much, It's not important"}, {"f": "答え合わせ こたえあわせ", "k": "", "e": "Checking answers"}, {"f": "確認", "k": "かくにん", "e": "Confirmation"}, {"f": "特長", "k": "とくちょう", "e": "Features"}, {"f": "出題", "k": "しゅつだい", "e": "Question"}, {"f": "効率", "k": "こうりつ", "e": "Efficiency"}, {"f": "学習", "k": "がくしゅう", "e": "Study"}, {"f": "対策", "k": "たいさく", "e": "Countermeasure"}, {"f": "受験対策", "k": "じゅけんたいさく", "e": "Test preparation"}, {"f": "役", "k": "やく", "e": "Role"}, {"f": "役に立つ", "k": "やくにたつ", "e": "Useful"}, {"f": "文章", "k": "ぶんしょう", "e": "Sentence, Reading comprehension"}, {"f": "聞き取り", "k": "ききとり", "e": "Listening"}, {"f": "随分", "k": "ずいぶん", "e": "Quite"}, {"f": "かぶる", "k": "", "e": "Wear"}, {"f": "運転", "k": "うんてん", "e": "Driving"}, {"f": "間に合う", "k": "まにあう", "e": "Arrive in time"}, {"f": "少ない", "k": "すくない", "e": "Few"}, {"f": "服", "k": "ふく", "e": "Clothes"}, {"f": "など", "k": "", "e": "Etc."}, {"f": "出張", "k": "しゅっちょう", "e": "Business trip"}, {"f": "パソコン", "k": "", "e": "PC"}, {"f": "ちこく", "k": "", "e": "Late"}, {"f": "引っこし", "k": "ひっこし", "e": "Moving"}, {"f": "返事", "k": "へんじ", "e": "Reply"}, {"f": "あんなに", "k": "", "e": "That much"}, {"f": "背の高い", "k": "せのたかい", "e": "Tall"}, {"f": "さびしい", "k": "", "e": "Lonely"}, {"f": "反対", // ─────────────────────────────────────────────────────────────────────────────

let deck = [], idx = 0;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function reshuffle() {
  deck = shuffle([...VOCAB]);
  idx = 0;
  show();
}

function show() {
  document.getElementById('card').classList.remove('flipped');
  const c = deck[idx];
  document.getElementById('front-text').textContent = c.f;
  document.getElementById('back-kana').textContent = c.k;
  document.getElementById('back-english').textContent = c.e;
  document.getElementById('cur').textContent = idx + 1;
  document.getElementById('tot').textContent = deck.length;
}

function nav(dir) {
  idx = (idx + dir + deck.length) % deck.length;
  show();
}

document.getElementById('card-wrap').addEventListener('click', () => {
  document.getElementById('card').classList.toggle('flipped');
});

// Swipe
let tx = 0;
document.addEventListener('touchstart', e => tx = e.touches[0].clientX, {passive: true});
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 50) nav(dx < 0 ? 1 : -1);
}, {passive: true});

reshuffle();
</script>

</html>
