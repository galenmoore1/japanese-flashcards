<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>日本語 Flashcards</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  background: #111827;
  color: #f3f4f6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
#progress {
  font-size: 14px;
  color: #6b7280;
  margin-bottom: 20px;
  letter-spacing: 0.5px;
}
#card-wrap {
  width: 100%;
  max-width: 420px;
  cursor: pointer;
}
#card {
  width: 100%;
  min-height: 240px;
  background: #1f2937;
  border: 1px solid #374151;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 36px 28px;
  text-align: center;
  gap: 18px;
  transition: border-color 0.2s;
}
#card:active { border-color: #2563eb; }
.line { opacity: 0; transition: opacity 0.3s ease; }
.line.visible { opacity: 1; }
#line-kanji { font-size: 38px; font-weight: 500; line-height: 1.35; }
#line-kana  { font-size: 22px; color: #93c5fd; }
#line-eng   { font-size: 22px; color: #f3f4f6; line-height: 1.4; }
#hint {
  font-size: 12px;
  color: #4b5563;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: opacity 0.2s;
}
#controls {
  display: flex;
  gap: 12px;
  margin-top: 28px;
  align-items: center;
}
button {
  background: #1f2937;
  color: #f3f4f6;
  border: 1px solid #374151;
  border-radius: 14px;
  padding: 14px 0;
  font-size: 22px;
  cursor: pointer;
  width: 80px;
  transition: background 0.15s;
}
button:active { background: #374151; }
#mode-btn {
  width: auto;
  padding: 14px 20px;
  font-size: 13px;
  color: #a5b4fc;
  border-color: #4338ca;
  letter-spacing: 0.5px;
}
#mode-btn.reversed {
  color: #fcd34d;
  border-color: #d97706;
}
#shuffle-btn {
  width: auto;
  padding: 14px 24px;
  font-size: 13px;
  color: #6b7280;
  border-color: #374151;
  margin-top: 12px;
}

/* ── Add button ────────────────────────────────────────────────────────────── */
#add-btn {
  position: fixed;
  bottom: 28px;
  right: 24px;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: #2563eb;
  border: none;
  color: #fff;
  font-size: 28px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(37,99,235,0.4);
  transition: background 0.15s, transform 0.15s;
  padding: 0;
  width: 52px;
}
#add-btn:active { background: #1d4ed8; transform: scale(0.94); }

/* ── Remove button ─────────────────────────────────────────────────────────── */
#remove-btn {
  position: fixed;
  bottom: 28px;
  left: 24px;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: #374151;
  border: none;
  color: #f87171;
  font-size: 28px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  transition: background 0.15s, transform 0.15s;
  padding: 0;
}
#remove-btn:active { background: #4b5563; transform: scale(0.94); }

/* ── Modal ─────────────────────────────────────────────────────────────────── */
#modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
#modal-overlay.open { display: flex; }
#modal {
  background: #1f2937;
  border: 1px solid #374151;
  border-radius: 20px;
  padding: 28px 24px 24px;
  width: calc(100% - 48px);
  max-width: 380px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
#modal h2 {
  font-size: 16px;
  font-weight: 600;
  color: #f3f4f6;
  margin-bottom: 4px;
}
#modal input[type="text"] {
  width: 100%;
  background: #111827;
  border: 1px solid #374151;
  border-radius: 10px;
  color: #f3f4f6;
  font-size: 17px;
  padding: 12px 14px;
  outline: none;
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
}
#modal input[type="text"]:focus { border-color: #2563eb; }
#modal input::placeholder { color: #4b5563; font-size: 14px; }
.modal-row {
  display: flex;
  gap: 10px;
}
#modal-add {
  flex: 1;
  background: #2563eb;
  border: none;
  border-radius: 12px;
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  padding: 13px;
  cursor: pointer;
  width: auto;
  transition: background 0.15s;
}
#modal-add:active { background: #1d4ed8; }
#modal-cancel {
  background: #111827;
  border: 1px solid #374151;
  border-radius: 12px;
  color: #9ca3af;
  font-size: 15px;
  padding: 13px 18px;
  cursor: pointer;
  width: auto;
}
.modal-divider {
  display: flex;
  align-items: center;
  gap: 10px;
  color: #4b5563;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.modal-divider::before, .modal-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #374151;
}
#tsv-upload-label {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: #111827;
  border: 1px dashed #4b5563;
  border-radius: 12px;
  padding: 13px;
  cursor: pointer;
  font-size: 13px;
  color: #9ca3af;
  transition: border-color 0.15s, color 0.15s;
}
#tsv-upload-label:hover { border-color: #6b7280; color: #d1d5db; }
#tsv-file { display: none; }
#modal-status {
  font-size: 13px;
  color: #34d399;
  text-align: center;
  min-height: 18px;
}
</style>
</head>
<body>

<div id="progress">Card <span id="cur">1</span> of <span id="tot">0</span></div>

<div id="card-wrap">
  <div id="card">
    <div id="line-kanji" class="line"></div>
    <div id="line-kana"  class="line"></div>
    <div id="line-eng"   class="line"></div>
    <div id="hint">tap to reveal</div>
  </div>
</div>

<a id="jisho-link" href="https://jisho.org"
   style="display:block;text-align:center;margin-top:14px;font-size:12px;color:#4b5563;text-decoration:none;letter-spacing:0.3px;">
  Look up on Jisho ↗
</a>

<div id="controls">
  <button onclick="nav(-1)">&#8592;</button>
  <button onclick="nav(1)">&#8594;</button>
  <button id="mode-btn" onclick="toggleMode()">EN first</button>
</div>
<button id="shuffle-btn" onclick="reshuffle()">&#x1F500; Shuffle</button>

<!-- ── Remove button ──────────────────────────────────────────────────────── -->
<button id="remove-btn" onclick="removeWord()" aria-label="Remove word">−</button>

<!-- ── Add button ─────────────────────────────────────────────────────────── -->
<button id="add-btn" onclick="openModal()" aria-label="Add word">+</button>

<!-- ── Modal ─────────────────────────────────────────────────────────────── -->
<div id="modal-overlay" onclick="overlayClick(event)">
  <div id="modal">
    <h2>Add word</h2>
    <input type="text" id="inp-kanji" placeholder="Kanji / front (e.g. 食べる)" autocomplete="off" autocorrect="off">
    <input type="text" id="inp-kana"  placeholder="Kana reading (e.g. たべる)" autocomplete="off" autocorrect="off">
    <input type="text" id="inp-eng"   placeholder="English" autocomplete="off">
    <div class="modal-row">
      <button id="modal-cancel" onclick="closeModal()">Cancel</button>
      <button id="modal-add" onclick="addWord()">Add</button>
    </div>

    <div class="modal-divider">or bulk import</div>

    <label id="tsv-upload-label" for="tsv-file">
      &#128196; Upload .tsv file (kanji &#9; kana &#9; english)
    </label>
    <input type="file" id="tsv-file" accept=".tsv,.txt" onchange="handleTSV(event)">

    <button id="export-btn" onclick="exportAdded()"
      style="background:#111827;border:1px solid #374151;border-radius:12px;color:#9ca3af;font-size:13px;padding:11px;width:100%;cursor:pointer;">
      &#8595; Export my added words (.tsv)
    </button>

    <div id="modal-status"></div>
  </div>
</div>

// Load added/removed words from localStorage
const _LS_KEY     = 'jp-flashcards-added';
const _LS_REM_KEY = 'jp-flashcards-removed';
(function() {
  try {
    const removed = new Set(JSON.parse(localStorage.getItem(_LS_REM_KEY) || '[]'));
    // Filter hardcoded VOCAB
    for (let i = VOCAB.length - 1; i >= 0; i--) {
      if (removed.has(VOCAB[i].f)) VOCAB.splice(i, 1);
    }
    // Merge added words
    const saved = JSON.parse(localStorage.getItem(_LS_KEY) || '[]');
    const existing = new Set(VOCAB.map(v => v.f));
    saved.forEach(w => {
      if (!removed.has(w.f) && !existing.has(w.f)) { VOCAB.push(w); existing.add(w.f); }
    });
  } catch(e) {}
})();

let deck = [], idx = 0, stage = 0, reversed = false;

function getStages(c) {
  if (reversed) {
    const s = [{el:'line-eng', text: c.e}];
    if (c.k) s.push({el:'line-kana', text: c.k});
    s.push({el:'line-kanji', text: c.f});
    return s;
  } else {
    const s = [{el:'line-kanji', text: c.f}];
    if (c.k) s.push({el:'line-kana', text: c.k});
    s.push({el:'line-eng', text: c.e});
    return s;
  }
}

function show() {
  const c = deck[idx];
  const ss = getStages(c);
  ['line-kanji','line-kana','line-eng'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('visible');
    el.textContent = '';
  });
  for (let i = 0; i <= stage && i < ss.length; i++) {
    const el = document.getElementById(ss[i].el);
    el.textContent = ss[i].text;
    el.classList.add('visible');
  }
  const hint = document.getElementById('hint');
  hint.style.opacity = stage >= ss.length - 1 ? '0' : '1';
  document.getElementById('cur').textContent = idx + 1;
  document.getElementById('tot').textContent = deck.length;
}

function tap() {
  const ss = getStages(deck[idx]);
  if (stage < ss.length - 1) {
    stage++;
    show();
  } else {
    nav(1);
  }
}

function nav(dir) {
  idx = (idx + dir + deck.length) % deck.length;
  stage = 0;
  show();
}

function toggleMode() {
  reversed = !reversed;
  const btn = document.getElementById('mode-btn');
  btn.textContent = reversed ? 'JP first' : 'EN first';
  btn.classList.toggle('reversed', reversed);
  stage = 0;
  show();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function reshuffle() {
  deck = shuffle([...VOCAB]);
  idx = 0; stage = 0;
  show();
}

// ── Add word ──────────────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('inp-kanji').focus();
  document.getElementById('modal-status').textContent = '';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  ['inp-kanji','inp-kana','inp-eng'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('modal-status').textContent = '';
}

function overlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function addWord() {
  const kanji = document.getElementById('inp-kanji').value.trim();
  const kana  = document.getElementById('inp-kana').value.trim();
  const e     = document.getElementById('inp-eng').value.trim();
  if ((!kanji && !kana) || !e) {
    document.getElementById('modal-status').style.color = '#f87171';
    document.getElementById('modal-status').textContent = 'At least kana or kanji, plus English, are required.';
    return;
  }
  // If no kanji, promote kana to front
  const f = kanji || kana;
  const k = kanji ? kana : '';
  const entry = {f, k, e};
  VOCAB.push(entry);
  deck.push(entry);
  try {
    const saved = JSON.parse(localStorage.getItem(_LS_KEY) || '[]');
    saved.push(entry);
    localStorage.setItem(_LS_KEY, JSON.stringify(saved));
  } catch(err) {}
  document.getElementById('modal-status').style.color = '#34d399';
  document.getElementById('modal-status').textContent = `Added "${f}" — deck now ${deck.length} cards.`;
  ['inp-kanji','inp-kana','inp-eng'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('inp-kanji').focus();
}

// ── TSV upload ────────────────────────────────────────────────────────────────
function parseTSV(text) {
  const existing = new Set(VOCAB.map(v => v.f));
  const added = [];
  for (const raw of text.split('\n')) {
    const line = raw.trim();
    if (!line || line.startsWith('#')) continue;
    const parts = line.split('\t');
    if (parts.length < 2) continue;
    const [f = '', k = '', ...rest] = parts;
    const e = rest.join('\t').trim();
    const front = f.trim();
    const kana  = k.trim();
    if (!front || !e) continue;
    if (existing.has(front)) continue;
    added.push({f: front, k: kana, e});
    existing.add(front);
  }
  return added;
}

function handleTSV(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const entries = parseTSV(e.target.result);
    entries.forEach(entry => { VOCAB.push(entry); deck.push(entry); });
    document.getElementById('modal-status').style.color = '#34d399';
    document.getElementById('modal-status').textContent =
      `Imported ${entries.length} new word${entries.length !== 1 ? 's' : ''} — deck now ${deck.length} cards.`;
    event.target.value = '';
  };
  reader.readAsText(file, 'utf-8');
}

// ── Remove current card ───────────────────────────────────────────────────────
function removeWord() {
  if (!deck.length) return;
  const word = deck[idx];
  // Save to removed list
  try {
    const removed = JSON.parse(localStorage.getItem(_LS_REM_KEY) || '[]');
    if (!removed.includes(word.f)) { removed.push(word.f); localStorage.setItem(_LS_REM_KEY, JSON.stringify(removed)); }
    // Also remove from added list if it was there
    const added = JSON.parse(localStorage.getItem(_LS_KEY) || '[]');
    const filtered = added.filter(w => w.f !== word.f);
    localStorage.setItem(_LS_KEY, JSON.stringify(filtered));
  } catch(e) {}
  // Remove from VOCAB and deck
  const vi = VOCAB.findIndex(w => w.f === word.f);
  if (vi !== -1) VOCAB.splice(vi, 1);
  deck.splice(idx, 1);
  if (!deck.length) { document.getElementById('line-kanji').textContent = 'All done!'; return; }
  idx = idx % deck.length;
  stage = 0;
  show();
}

// ── Export adds + removes as TSV, then clear localStorage ────────────────────
function exportAdded() {
  const added   = JSON.parse(localStorage.getItem(_LS_KEY)     || '[]');
  const removed = JSON.parse(localStorage.getItem(_LS_REM_KEY) || '[]');
  if (!added.length && !removed.length) {
    document.getElementById('modal-status').style.color = '#f87171';
    document.getElementById('modal-status').textContent = 'Nothing to export yet.';
    return;
  }
  const lines = [
    ...added.map(w => `${w.f}\t${w.k}\t${w.e}`),
    ...removed.map(f => `#REMOVE\t${f}`),
  ];
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([lines.join('\n')], {type: 'text/tab-separated-values'}));
  a.download = `flashcards-${new Date().toISOString().slice(0,10)}.tsv`;
  a.click();
  localStorage.removeItem(_LS_KEY);
  localStorage.removeItem(_LS_REM_KEY);
  const total = added.length + removed.length;
  document.getElementById('modal-status').style.color = '#34d399';
  document.getElementById('modal-status').textContent = `Exported ${total} change${total !== 1 ? 's' : ''} — local storage cleared.`;
}

// ── Input: Enter key submits ──────────────────────────────────────────────────
['inp-kanji','inp-kana','inp-eng'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') addWord();
  });
});

let tx = 0, _touchTarget = null;
document.addEventListener('touchstart', e => {
  tx = e.touches[0].clientX;
  _touchTarget = e.target;
}, {passive: true});
document.addEventListener('touchend', e => {
  if (_touchTarget && _touchTarget.closest('#add-btn, #remove-btn')) return;
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 50) nav(dx < 0 ? 1 : -1);
}, {passive: true});

reshuffle();

  openModal();
}
